<div id="customers">
  <form class="row g-3 customer-form">
    <h1>Customers</h1>
    <div class="col-lg-3 col-12 col-md-6 col-sm-12">
      <label for="customer_id" class="form-label">Customer Id</label>
      <input type="text" class="form-control fields" id="customer_id" name="customer_id" placeholder="C001" [(ngModel)]="customerId">
    </div>
    <div class=" col-lg-3 col-12 col-md-6 col-sm-12">
      <label for="customer_name" class="form-label">Name</label>
      <input type="text" class="form-control fields" id="customer_name" placeholder="Sachin" name="customer_name" [(ngModel)]="customerName">
    </div>
    <div class="col-md-12 col-lg-6 col-sm-12">
      <label for="customer_address" class="form-label">Address</label>
      <input type="text" class="form-control fields" id="customer_address" placeholder="1234 Main St" name="customer_address" [(ngModel)]="customerAddress">
    </div>
    <div class="col-12 button-section">
      <button id="add_customer" type="submit" class="btn btn-success"  (click)="onAdd()">Add</button>
      <button id="update_customer" type="submit" class="btn btn-primary">Update</button>
    </div>
    <div class="col-md-6 col-sm-12 col-lg-4">
<!--      <label for="search" class="form-label">Search</label>-->
      <input id="customerSearchField" type="text" class="form-control" placeholder="search id or name...">
    </div>
  </form>
  <table class="table table-hover">
    <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Name</th>
      <th scope="col">Address</th>
      <th scope="col">Option</th>
    </tr>
    </thead>
    <tbody id="customerTbl">

    </tbody>
  </table>
</div>
